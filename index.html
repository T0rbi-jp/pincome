<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Your Reward</title>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            background-color: #1e3a29; /* Deep Green */
            font-family: 'Georgia', serif; /* Classic, premium feel */
            color: white;
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Container for the 35 coins */
        #coin-splash {
            position: absolute;
            top: 15%;
            width: 100%;
            height: 300px;
            pointer-events: none;
        }

        .coin {
            position: absolute;
            width: 60px;
            height: 60px;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/Gold_coin_icon.png/600px-Gold_coin_icon.png');
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0;
            animation: burst 3s ease-out forwards;
        }

        @keyframes burst {
            0% { transform: scale(0.2) translate(0, 0); opacity: 1; }
            100% { transform: scale(1) translate(var(--dx), var(--dy)); opacity: 0; }
        }

        .text-container {
            margin-top: 150px;
            padding: 20px;
            z-index: 2;
        }

        h1 { font-size: 40px; margin-bottom: 20px; }
        p { font-size: 22px; line-height: 1.6; max-width: 500px; margin: 0 auto 30px auto; }

        .btn { 
            background: #4a2c1a; /* Deep Brown */
            color: #ffffff;
            padding: 20px 60px;
            text-decoration: none;
            border-radius: 12px;
            font-size: 24px;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="coin-splash"></div>

    <div class="text-container">
        <h1>Congratulations!</h1>
        <p>You are eligible for <b>₦1,000,000</b> cash prize rewards. Apply with your bank details and grab the cash prize now.</p>
        <a href="https://ldl1.com/link?z=11238065&var={SOURCE_ID}&ymid={CLICK_ID}" class="btn">APPLY NOW</a>
    </div>

    <script>
        const splash = document.getElementById('coin-splash');
        for (let i = 0; i < 35; i++) {
            let coin = document.createElement('div');
            coin.className = 'coin';
            // Random splash direction
            let dx = (Math.random() - 0.5) * 600;
            let dy = (Math.random() - 0.5) * 400;
            coin.style.setProperty('--dx', dx + 'px');
            coin.style.setProperty('--dy', dy + 'px');
            coin.style.left = '50%';
            splash.appendChild(coin);
        }
    </script>
</body>
</html>
